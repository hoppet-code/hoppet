name: Build Python Wheels

on:
  push:
    branches: [2025-09-python-wheels]
  pull_request:
  workflow_dispatch:

jobs:
  build_wheels:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install CMake and build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install cibuildwheel
          pip install numpy

      - name: Build wheels
        env:
          CIBW_BUILD: "cp38-* cp39-* cp310-* cp311-* cp312-*"
          CIBW_SKIP: "*-win32 *-win_amd64 *-manylinux_i686"
        run: |
          cibuildwheel pyinterface --output-dir wheelhouse

      - name: Upload wheels
        uses: actions/upload-artifact@v3
        with:
          name: python-wheels
          path: wheelhouse/*.whl